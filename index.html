<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ballistic Final</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #111; overflow: hidden; touch-action: none; user-select: none; font-family: sans-serif; }
        #gameCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; }
        #ffBtn {
            position: absolute; bottom: 20px; right: 20px; width: 70px; height: 70px; 
            background: rgba(255,255,255,0.2); border-radius: 50%; color: white; 
            border: 2px solid #fff; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 14px; z-index: 10;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ffBtn">1x</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const ffBtn = document.getElementById('ffBtn');

        let speeds = [1, 3, 10, 100, 10000];
        let speedIdx = 0;
        let score = 0, highScore = parseInt(localStorage.getItem('ballisticHighScore')) || 0;
        let level = 1, ballCount = 1, extraBallsNextTurn = 0;
        let balls = [], blocks = [], items = [], state = 'aiming';
        let startX = 0, startY = 0, nextStartX = null, aimX = 0, aimY = 0, isDragging = false;
        
        const ballRadius = 6, blockCols = 7, blockPadding = 4;

        function resize() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            startY = canvas.height - 100;
            if (state === 'aiming') startX = canvas.width / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        function spawnBlocks() {
            const blockWidth = (canvas.width - blockPadding * (blockCols + 1)) / blockCols;
            blocks.forEach(b => b.y += blockWidth + blockPadding);
            items.forEach(i => i.y += blockWidth + blockPadding);
            for (let i = 0; i < blockCols; i++) {
                let x = blockPadding + i * (blockWidth + blockPadding);
                if (Math.random() > 0.85) items.push({ x, y: 90, w: blockWidth, h: blockWidth, active: true });
                else if (Math.random() > 0.4) blocks.push({ x, y: 90, w: blockWidth, h: blockWidth, hp: level });
            }
        }

        function update() {
            if (state !== 'shooting') return;
            for(let step = 0; step < speeds[speedIdx]; step++) {
                let active = 0;
                balls.forEach(b => {
                    if (!b.active) { if (b.delay > 0) { b.delay--; active++; } else b.active = true; return; }
                    b.x += b.vx; b.y += b.vy;
                    if (b.x-ballRadius < 0 || b.x+ballRadius > canvas.width) { b.vx *= -1; b.x = (b.x < ballRadius) ? ballRadius : canvas.width - ballRadius; }
                    if (b.y-ballRadius < 0) { b.vy *= -1; b.y = ballRadius; }
                    if (b.vy > 0 && b.y >= startY) { b.active = false; b.y = startY; if (nextStartX === null) nextStartX = b.x; return; }
                    active++;

                    // 【核心修正】ブロックの辺に対する正確な反射判定
                    blocks.forEach(bl => {
                        let nearestX = Math.max(bl.x, Math.min(b.x, bl.x + bl.w));
                        let nearestY = Math.max(bl.y, Math.min(b.y, bl.y + bl.h));
                        let dx = b.x - nearestX, dy = b.y - nearestY;
                        
                        if (dx*dx + dy*dy <= ballRadius*ballRadius) {
                            // どの辺に当たったか判定
                            let overlapX = ballRadius - Math.abs(dx);
                            let overlapY = ballRadius - Math.abs(dy);
                            
                            if (overlapX < overlapY) {
                                b.vx *= -1;
                                b.x += (dx > 0) ? overlapX : -overlapX;
                            } else {
                                b.vy *= -1;
                                b.y += (dy > 0) ? overlapY : -overlapY;
                            }
                            bl.hp--; score++; if (bl.hp <= 0) bl.toRemove = true;
                        }
                    });
                    blocks = blocks.filter(b => !b.toRemove);
                });
                if (active === 0) {
                    state = 'aiming'; level++; ballCount += extraBallsNextTurn; extraBallsNextTurn = 0;
                    if (nextStartX !== null) startX = nextStartX; spawnBlocks();
                    if (score > highScore) { highScore = score; localStorage.setItem('ballisticHighScore', highScore); }
                    break;
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff'; ctx.fillText(`SCORE: ${score} | BEST: ${highScore}`, 15, 30);
            ctx.beginPath(); ctx.moveTo(0, startY); ctx.lineTo(canvas.width, startY); ctx.stroke();
            
            if (state === 'aiming') {
                if (isDragging) { ctx.beginPath(); ctx.setLineDash([8,8]); ctx.moveTo(startX, startY); ctx.lineTo(aimX, aimY); ctx.stroke(); ctx.setLineDash([]); }
                ctx.beginPath(); ctx.arc(startX, startY, ballRadius, 0, Math.PI*2); ctx.fill();
            }

            blocks.forEach(b => {
                let ratio = Math.max(0, 1 - (b.hp / (level + 2)));
                ctx.fillStyle = `hsl(${220 - (ratio * 220)}, 80%, 50%)`;
                ctx.fillRect(b.x, b.y, b.w, b.h);
                ctx.fillStyle = '#fff'; ctx.textAlign='center'; ctx.fillText(b.hp, b.x+b.w/2, b.y+b.h/2+5);
            });
            items.forEach(it => { if(it.active) { ctx.fillStyle = '#0f0'; ctx.fillRect(it.x, it.y, it.w, it.h); } });
            balls.forEach(b => { if(b.active) { ctx.beginPath(); ctx.arc(b.x, b.y, ballRadius, 0, Math.PI*2); ctx.fill(); } });
            
            update(); requestAnimationFrame(draw);
        }

        ffBtn.onclick = () => { speedIdx = (speedIdx + 1) % speeds.length; ffBtn.innerText = speeds[speedIdx] + 'x'; };
        canvas.addEventListener('touchstart', (e) => { isDragging = true; aimX = e.touches[0].clientX; aimY = e.touches[0].clientY; });
        canvas.addEventListener('touchmove', (e) => { aimX = e.touches[0].clientX; aimY = e.touches[0].clientY; });
        canvas.addEventListener('touchend', (e) => { 
            if(isDragging) {
                let dx = aimX - startX, dy = aimY - startY;
                const angle = Math.atan2(dy < -10 ? dy : -10, dx), speed = 22;
                balls = []; for(let i=0; i<ballCount; i++) balls.push({ x: startX, y: startY, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, active: false, delay: i*4 });
                state = 'shooting'; isDragging = false;
            }
        });
        
        spawnBlocks(); draw();
    </script>
</body>
</html>
