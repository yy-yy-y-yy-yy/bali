<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Ballistic Clone</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #222; 
            overflow: hidden; 
            touch-action: none; 
            font-family: sans-serif;
        }
        canvas { 
            display: block; 
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // ゲームの基本状態
        let score = 0;
        let highScore = localStorage.getItem('ballisticHighScore') || 0;
        let level = 1;
        let ballCount = 1; // 初期ボール数
        let extraBallsNextTurn = 0; // 次のターンで増えるボールの数
        
        let balls = [];
        let blocks = [];
        let items = []; // ボール追加アイテム
        
        let state = 'aiming'; // 'aiming', 'shooting', 'gameover'
        let startX = canvas.width / 2;
        let startY = canvas.height - 50; // 床の位置
        let nextStartX = null; // 次のターンの発射位置（最初に落ちたボールの位置）
        
        let aimX = startX;
        let aimY = startY - 100;
        let isDragging = false;

        const ballRadius = 6;
        const blockCols = 7;
        const blockPadding = 5;

        // ゲームのリセット
        function resetGame() {
            score = 0;
            level = 1;
            ballCount = 1;
            extraBallsNextTurn = 0;
            blocks = [];
            items = [];
            startX = canvas.width / 2;
            nextStartX = null;
            state = 'aiming';
            spawnBlocks();
        }

        // ブロックとアイテムの生成
        function spawnBlocks() {
            const blockWidth = (canvas.width - blockPadding * (blockCols + 1)) / blockCols;
            const blockHeight = blockWidth;
            const startYPos = 80; // スコア表示の下から開始

            // 既存のブロックとアイテムを一段下げる
            blocks.forEach(b => b.y += blockHeight + blockPadding);
            items.forEach(i => i.y += blockHeight + blockPadding);

            // ゲームオーバー判定（ブロックが床に到達したか）
            let isGameOver = false;
            blocks.forEach(b => {
                if (b.y + b.height >= startY) {
                    isGameOver = true;
                }
            });

            if (isGameOver) {
                state = 'gameover';
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('ballisticHighScore', highScore);
                }
                return;
            }

            // 新しい列を生成
            // アイテムを配置する列をランダムに1つ決める
            let itemCol = Math.floor(Math.random() * blockCols);

            for (let i = 0; i < blockCols; i++) {
                let x = blockPadding + i * (blockWidth + blockPadding);
                
                if (i === itemCol) {
                    // ボール追加アイテムを生成
                    items.push({
                        x: x + blockWidth / 2,
                        y: startYPos + blockHeight / 2,
                        radius: blockWidth / 3,
                        active: true
                    });
                } else if (Math.random() > 0.4) {
                    // ブロックを生成（HPは現在のレベルと同じ）
                    blocks.push({
                        x: x,
                        y: startYPos,
                        width: blockWidth,
                        height: blockHeight,
                        hp: level
                    });
                }
            }
        }

        // 入力処理
        function handleStart(e) {
            if (state === 'gameover') {
                resetGame();
                return;
            }
            if (state !== 'aiming') return;
            isDragging = true;
            updateAim(e);
        }
        
        function handleMove(e) {
            if (!isDragging || state !== 'aiming') return;
            updateAim(e);
        }
        
        function handleEnd(e) {
            if (!isDragging || state !== 'aiming') return;
            isDragging = false;
            shootBalls();
        }

        function updateAim(e) {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            // 指を置いた方向を直接狙う
            aimX = clientX;
            aimY = clientY;
            
            // 下方向（床より下）には撃てないように制限
            if (aimY > startY - 20) aimY = startY - 20; 
        }

        canvas.addEventListener('touchstart', handleStart);
        canvas.addEventListener('touchmove', handleMove, {passive: false});
        canvas.addEventListener('touchend', handleEnd);
        canvas.addEventListener('mousedown', handleStart);
        canvas.addEventListener('mousemove', handleMove);
        canvas.addEventListener('mouseup', handleEnd);
        
        // スワイプによる画面スクロールを強制ブロック
        canvas.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });

        // ボールの発射
        function shootBalls() {
            state = 'shooting';
            nextStartX = null;
            
            const angle = Math.atan2(aimY - startY, aimX - startX);
            const speed = 18; // ボールの速さ
            const vx = Math.cos(angle) * speed;
            const vy = Math.sin(angle) * speed;

            balls = [];
            for (let i = 0; i < ballCount; i++) {
                balls.push({
                    x: startX,
                    y: startY,
                    vx: vx,
                    vy: vy,
                    active: false,
                    delay: i * 4 // ボールの発射間隔
                });
            }
        }

        // 当たり判定と更新
        function update() {
            if (state !== 'shooting') return;
            
            let activeBalls = 0;

            balls.forEach(ball => {
                if (!ball.active) {
                    if (ball.delay <= 0) {
                        ball.active = true;
                    } else {
                        ball.delay--;
                        activeBalls++;
                    }
                    return;
                }

                // 移動
                ball.x += ball.vx;
                ball.y += ball.vy;

                // 壁との反射
                if (ball.x - ballRadius < 0 || ball.x + ballRadius > canvas.width) {
                    ball.vx *= -1;
                    ball.x = ball.x - ballRadius < 0 ? ballRadius : canvas.width - ballRadius;
                }
                if (ball.y - ballRadius < 0) {
                    ball.vy *= -1;
                    ball.y = ballRadius;
                }

                // 床に到達した時の処理
                if (ball.y + ballRadius >= startY) {
                    ball.active = false;
                    ball.y = startY;
                    
                    // 最初に床に着いたボールの位置を次のターンの開始位置にする
                    if (nextStartX === null) {
                        nextStartX = ball.x;
                    }
                    ball.x = nextStartX;
                    return;
                }

                activeBalls++;

                // アイテムとの当たり判定
                for (let i = items.length - 1; i >= 0; i--) {
                    let item = items[i];
                    if (!item.active) continue;

                    let dx = ball.x - item.x;
                    let dy = ball.y - item.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance <= ballRadius + item.radius) {
                        item.active = false; // アイテム取得
                        extraBallsNextTurn++;
                        items.splice(i, 1);
                    }
                }

                // ブロックとの当たり判定
                for (let i = blocks.length - 1; i >= 0; i--) {
                    let b = blocks[i];
                    
                    let testX = ball.x;
                    let testY = ball.y;

                    if (ball.x < b.x) testX = b.x; 
                    else if (ball.x > b.x + b.width) testX = b.x + b.width;
                    if (ball.y < b.y) testY = b.y; 
                    else if (ball.y > b.y + b.height) testY = b.y + b.height;

                    let distX = ball.x - testX;
                    let distY = ball.y - testY;
                    let distance = Math.sqrt((distX * distX) + (distY * distY));

                    if (distance <= ballRadius) {
                        // 衝突処理（反転）
                        if (Math.abs(distX) > Math.abs(distY)) ball.vx *= -1;
                        else ball.vy *= -1;
