<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Ballistic Clone Fix</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #222; 
            overflow: hidden; 
            touch-action: none; /* iPhoneでのスクロールを防止 */
            font-family: sans-serif;
            position: fixed; /* iPhoneでのズレを防止 */
            width: 100%;
            height: 100%;
        }
        canvas { 
            display: block; 
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ハイスコアの安全な取得
        let highScore = 0;
        try {
            highScore = localStorage.getItem('ballisticHighScore') || 0;
        } catch (e) {}

        // ゲームの基本状態
        let score = 0;
        let level = 1;
        let ballCount = 1; 
        let extraBallsNextTurn = 0; 
        
        let balls = [];
        let blocks = [];
        let items = []; 
        
        let state = 'aiming'; 
        let startX = 0;
        let startY = 0; 
        let nextStartX = null; 
        
        let aimX = 0;
        let aimY = 0;
        let isDragging = false; // エイム中かどうかのフラグ

        const ballRadius = 7; // ボールを少し大きく視認性向上
        const blockCols = 7;
        const blockPadding = 5;

        // 画面サイズ取得と床位置の設定
        function resize() {
            canvas.width = window.innerWidth || 320;
            canvas.height = window.innerHeight || 480;
            startY = canvas.height - 80; // 床の位置
            if (state === 'aiming' && nextStartX === null) {
                startX = canvas.width / 2;
            }
        }
        window.addEventListener('resize', resize);
        resize(); // 初回実行

        // ゲームのリセット
        function resetGame() {
            score = 0;
            level = 1;
            ballCount = 1;
            extraBallsNextTurn = 0;
            blocks = [];
            items = [];
            nextStartX = null;
            resize(); 
            state = 'aiming';
            spawnBlocks();
        }

        // ブロックとアイテムの生成
        function spawnBlocks() {
            const blockWidth = Math.max(10, (canvas.width - blockPadding * (blockCols + 1)) / blockCols);
            const blockHeight = blockWidth;
            const startYPos = 80; // スコア表示の下

            // 既存のブロックとアイテムを一段下げる
            blocks.forEach(b => b.y += blockHeight + blockPadding);
            items.forEach(i => i.y += blockHeight + blockPadding);

            // ゲームオーバー判定
            let isGameOver = false;
            blocks.forEach(b => {
                if (b.y + b.height >= startY) isGameOver = true;
            });

            if (isGameOver) {
                state = 'gameover';
                try {
                    if (score > highScore) {
                        highScore = score;
                        localStorage.setItem('ballisticHighScore', highScore);
                    }
                } catch(e) {}
                return;
            }

            // 新しい列を生成
            let itemCol = Math.floor(Math.random() * blockCols);
            for (let i = 0; i < blockCols; i++) {
                let x = blockPadding + i * (blockWidth + blockPadding);
                if (i === itemCol) {
                    items.push({
                        x: x + blockWidth / 2,
                        y: startYPos + blockHeight / 2,
                        radius: Math.max(5, blockWidth / 3.5),
                        active: true
                    });
                } else if (Math.random() > 0.4) {
                    blocks.push({
                        x: x,
                        y: startYPos,
                        width: blockWidth,
                        height: blockHeight,
                        hp: level
                    });
                }
            }
        }

        // 【修正】iPhoneでの入力処理を大幅に変更

        function getTouchPos(e) {
            const rect = canvas.getBoundingClientRect();
            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function handleStart(e) {
            if (state === 'gameover') {
                resetGame();
                return;
            }
            if (state !== 'aiming') return;
            
            isDragging = true;
            const pos = getTouchPos(e);
            aimX = pos.x;
            aimY = pos.y;
            // エイム開始時は下方向入力を制限
            if (aimY > startY - 20) aimY = startY - 20;

            // iPhoneのスクロールを完全にブロック
            if (e.cancelable) e.preventDefault();
        }
        
        function handleMove(e) {
            if (!isDragging || state !== 'aiming') return;
            
            const pos = getTouchPos(e);
            aimX = pos.x;
            aimY = pos.y;
            
            // 下方向（床より下）には撃てないように制限
            if (aimY > startY - 20) aimY = startY - 20; 

            // iPhoneのスクロールを完全にブロック
            if (e.cancelable) e.preventDefault();
        }
        
        function handleEnd(e) {
            if (!isDragging || state !== 'aiming') return;
            
            isDragging = false;
            shootBalls();
            
            // iPhoneのエフェクトをブロック
            if (e.cancelable) e.preventDefault();
        }

        // イベントリスナーの登録
        canvas.addEventListener('touchstart', handleStart, {passive: false});
        canvas.addEventListener('touchmove', handleMove, {passive: false});
        canvas.addEventListener('touchend', handleEnd, {passive: false});
        canvas.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove); // エイム中に画面外に出ても追従するようにwindowに登録
        window.addEventListener('mouseup', handleEnd);

        // ボールの発射
        function shootBalls() {
            state = 'shooting';
            nextStartX = null;
            
            // 狙った位置（aimX, aimY）と発射位置（startX, startY）の角度を計算
            const dx = aimX - startX;
            const dy = aimY - startY;
            const angle = Math.atan2(dy, dx);
            
            const speed = 20; // ボールの速さ
            const vx = Math.cos(angle) * speed;
            const vy = Math.sin(angle) * speed;

            balls = [];
            for (let i = 0; i < ballCount; i++) {
                balls.push({
                    x: startX,
                    y: startY,
                    vx: vx,
                    vy: vy,
                    active: false,
                    delay: i * 3 // 発射間隔を少し短く
                });
            }
        }

        // 当たり判定と更新
        function update() {
            if (state !== 'shooting') return;
            
            let activeBalls = 0;

            balls.forEach(ball => {
                if (!ball.active) {
                    if (ball.delay <= 0) {
                        ball.active = true;
                    } else {
                        ball.delay--;
                        activeBalls++;
                    }
                    return;
                }

                // 移動
                ball.x += ball.vx;
                ball.y += ball.vy;

                // 壁との反射
                if (ball.x - ballRadius < 0 || ball.x + ballRadius > canvas.width) {
                    ball.vx *= -1;
                    ball.x = ball.x - ballRadius < 0 ? ballRadius : canvas.width - ballRadius;
                }
                if (ball.y - ballRadius < 0) {
                    ball.vy *= -1;
                    ball.y = ballRadius;
                }

                // 床に到達した時の処理
                if (ball.y + ballRadius >= startY) {
                    ball.active = false;
                    ball.y = startY;
                    
                    // 最初に床に着いたボールの位置を次のターンの開始位置にする
                    if (nextStartX === null) {
                        nextStartX = ball.x;
                    }
                    ball.x = nextStartX;
                    return;
                }

                activeBalls++;

                // アイテムとの当たり判定
                for (let i = items.length - 1; i >= 0; i--) {
                    let item = items[i];
                    if (!item.active) continue;

                    let dx = ball.x - item.x;
                    let dy = ball.y - item.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance <= ballRadius + item.radius) {
                        item.active = false; // アイテム取得
                        extraBallsNextTurn++;
                        items.splice(i, 1);
                    }
                }

                // ブロックとの当たり判定（矩形と円）
                for (let i = blocks.length - 1; i >= 0; i--) {
                    let b = blocks[i];
                    
                    let testX = ball.x;
                    let testY = ball.y;

                    if (ball.x < b.x) testX = b.x; 
                    else if (ball.x > b.x + b.width) testX = b.x + b.width;
                    if (ball.y < b.y) testY = b.y; 
                    else if (ball.y > b.y + b.height) testY = b.y + b.height;

                    let distX = ball.x - testX;
                    let distY = ball.y - testY;
                    let distance = Math.sqrt((distX * distX) + (distY * distY));

                    if (distance <= ballRadius) {
                        // 衝突処理（反転）
                        if (Math.abs(distX) > Math.abs(distY)) {
                            ball.vx *= -1;
                            // 貫通防止のため少し押し戻す
                            if (ball.x < b.x) ball.x = b.x - ballRadius;
                            else ball.x = b.x + b.width + ballRadius;
                        } else {
                            ball.vy *= -1;
                            if (ball.y < b.y) ball.y = b.y - ballRadius;
                            else ball.y = b.y + b.height + ballRadius;
                        }

                        // HPを減らし、スコアを加算
                        b.hp--;
                        score++;
                        
                        if (b.hp <= 0) blocks.splice(i, 1);
                        break; // 一つのボールは一つのブロックにのみ一度に当たる
                    }
                }
            });

            // 全てのボールが戻ってきたらターン終了
            if (activeBalls === 0) {
                state = 'aiming';
                level++;
                ballCount += extraBallsNextTurn
