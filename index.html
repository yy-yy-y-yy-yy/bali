<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Ballistic Final</title>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #111; overflow: hidden; touch-action: none; 
            user-select: none; -webkit-user-select: none; font-family: sans-serif;
        }
        #gameCanvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block;
        }
        /* サイズ調整ボタン（左下） */
        #sizeBtn {
            position: absolute; bottom: 20px; left: 20px; width: 70px; height: 70px; 
            background: rgba(255,255,255,0.2); border-radius: 50%; color: white; 
            border: 2px solid #fff; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 16px; z-index: 10; cursor: pointer;
        }
        /* 硬さ調整ボタン（中央下・青） */
        #hardBtn {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 70px; height: 70px; 
            background: rgba(0, 150, 255, 0.2); border-radius: 50%; color: #8cf; 
            border: 2px solid #8cf; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 16px; z-index: 10; cursor: pointer;
        }
        /* スピード調整ボタン（右下） */
        #ffBtn {
            position: absolute; bottom: 20px; right: 20px; width: 70px; height: 70px; 
            background: rgba(255,255,255,0.2); border-radius: 50%; color: white; 
            border: 2px solid #fff; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 16px; z-index: 10; cursor: pointer;
        }
        #errorBox {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #fff; color: #d00; padding: 20px; box-sizing: border-box; 
            z-index: 9999; display: none; overflow-y: auto;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="sizeBtn">Sz: S</div>
    <div id="hardBtn">Hp: 1x</div>
    <div id="ffBtn">1x</div>
    
    <div id="errorBox"></div>

    <script>
        const errBox = document.getElementById('errorBox');
        function showError(msg, err) {
            errBox.style.display = 'block';
            errBox.innerHTML += '<h3>' + msg + '</h3>';
            if (err && err.stack) errBox.innerHTML += '<pre style="font-size:12px; color:#333; white-space:pre-wrap;">' + err.stack + '</pre><hr>';
        }

        window.onerror = function(msg, url, line) {
            showError('エラー: ' + msg + ' (行: ' + line + ')');
            return true;
        };

        try {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const ffBtn = document.getElementById('ffBtn');
            const hardBtn = document.getElementById('hardBtn');
            const sizeBtn = document.getElementById('sizeBtn');

            // スピード倍率
            let speeds = [1, 3, 10, 100, 10000];
            let speedIdx = 0;

            // 硬さ倍率
            let hardMax = 1;

            // サイズ（難易度）設定
            const sizeLabels = ['S', 'M', 'L', 'XL'];
            const sizeValues = [6, 9, 12, 16]; 
            let sizeIdx = 0;
            let ballRadius = sizeValues[sizeIdx];

            let highScore = 0;
            try { highScore = parseInt(localStorage.getItem('ballisticHighScore')) || 0; } catch (e) {}

            let score = 0, level = 1, ballCount = 1, extraBallsNextTurn = 0;
            let balls = [], blocks = [], items = [];
            let state = 'aiming'; 
            let startX = 0, startY = 0, nextStartX = null;
            let aimX = 0, aimY = 0, isDragging = false;
            
            const blockCols = 7;
            const blockPadding = 4;

            function resize() {
                canvas.width = window.innerWidth || document.documentElement.clientWidth || 320;
                canvas.height = window.innerHeight || document.documentElement.clientHeight || 480;
                startY = canvas.height - 100;
                if (state === 'aiming' && nextStartX === null) startX = canvas.width / 2;
            }

            function resetGame() {
                score = 0; level = 1; ballCount = 1; extraBallsNextTurn = 0;
                blocks = []; items = []; nextStartX = null;
                resize(); 
                state = 'aiming';
                spawnBlocks();
            }

            function spawnBlocks() {
                const blockWidth = Math.max(10, (canvas.width - blockPadding * (blockCols + 1)) / blockCols);
                const blockHeight = blockWidth;
                const startYPos = 90;

                blocks.forEach(b => b.y += blockHeight + blockPadding);
                items.forEach(i => i.y += blockHeight + blockPadding);

                let isGameOver = false;
                blocks.forEach(b => { if (b.y + b.height >= startY) isGameOver = true; });

                if (isGameOver) {
                    state = 'gameover';
                    try {
                        if (score > highScore) { highScore = score; localStorage.setItem('ballisticHighScore', highScore); }
                    } catch(e) {}
                    return;
                }

                let itemCol = Math.floor(Math.random() * blockCols);
                for (let i = 0; i < blockCols; i++) {
                    let x = blockPadding + i * (blockWidth + blockPadding);
                    if (i === itemCol) {
                        items.push({ x: x, y: startYPos, width: blockWidth, height: blockHeight, active: true });
                    } else if (Math.random() > 0.4) {
                        let multiplier = Math.floor(Math.random() * hardMax) + 1; 
                        let blockHp = level * multiplier;
                        blocks.push({ x: x, y: startYPos, width: blockWidth, height: blockHeight, hp: blockHp });
                    }
                }
            }

            function getTouchPos(e) {
                if (e.changedTouches && e.changedTouches.length > 0) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
                return { x: e.clientX || 0, y: e.clientY || 0 };
            }

            // スピードボタン
            ffBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                speedIdx = (speedIdx + 1) % speeds.length;
                ffBtn.innerText = speeds[speedIdx] + 'x';
            });

            // 硬さボタン
            hardBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                hardMax = (hardMax % 4) + 1; 
                hardBtn.innerText = 'Hp: ' + hardMax + 'x';
            });

            // サイズボタン
            sizeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (state === 'shooting') return; 
                sizeIdx = (sizeIdx + 1) % sizeLabels.length;
                sizeBtn.innerText = 'Sz: ' + sizeLabels[sizeIdx];
                ballRadius = sizeValues[sizeIdx];
            });

            function handleStart(e) {
                if (e.cancelable) e.preventDefault();
                if (state === 'gameover') { resetGame(); return; }
                if (state !== 'aiming') return;
                isDragging = true;
                const pos = getTouchPos(e);
                aimX = pos.x; aimY = pos.y;
            }
            function handleMove(e) {
                if (e.cancelable) e.preventDefault();
                if (!isDragging || state !== 'aiming') return;
                const pos = getTouchPos(e);
                aimX = pos.x; aimY = pos.y;
            }
            function handleEnd(e) {
                if (e.cancelable) e.preventDefault();
                if (!isDragging || state !== 'aiming') return;
                isDragging = false;
                state = 'shooting'; nextStartX = null;
                let dx = aimX - startX, dy = aimY - startY;
                const angle = Math.atan2(dy < -10 ? dy : -10, dx);
                
                const speed = 4.4; 
                balls = [];
                for (let i = 0; i < ballCount; i++) {
                    balls.push({ x: startX, y: startY, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, active: false, delay: i * 20 });
                }
            }

            function update() {
                if (state !== 'shooting') return;
                
                let totalSteps = speeds[speedIdx] * 5; 
                for(let step = 0; step < totalSteps; step++) {
                    let activeBalls = 0;
                    balls.forEach(ball => {
                        if (!ball.active) {
                            if (ball.delay > 0) { ball.delay--; activeBalls++; return; }
                            else ball.active = true;
                        }
                        
                        ball.x += ball.vx; 
                        ball.y += ball.vy;
                        
                        // 壁の反射（ballRadius連動）
                        if (ball.x - ballRadius < 0 || ball.x + ballRadius > canvas.width) { 
                            ball.vx *= -1; 
                            ball.x = (ball.x < ballRadius) ? ballRadius : canvas.width - ballRadius; 
                        }
                        if (ball.y - ballRadius < 0) { 
                            ball.y = ballRadius; ball.vy *= -1; 
                        }
                        if (ball.vy > 0 && ball.y >= startY) { 
                            ball.active = false; ball.y = startY; 
                            if (nextStartX === null) nextStartX = ball.x; 
                            return; 
                        }
                        activeBalls++;
                        
                        // アイテム取得判定
                        items.forEach(it => {
                            if (!it.active) return;
                            let tx = Math.max(it.x, Math.min(ball.x, it.x + it.width));
                            let ty = Math.max(it.y, Math.min(ball.y, it.y + it.height));
                            let dx = ball.x - tx, dy = ball.y - ty;
                            if (dx * dx + dy * dy <= ballRadius * ballRadius) {
                                it.active = false; extraBallsNextTurn++;
                            }
                        });

                        // ブロックの当たり判定（めり込み防止）
                        for (let i = 0; i < blocks.length; i++) {
                            let b = blocks[i];
                            let tx = Math.max(b.x, Math.min(ball.x, b.x + b.width));
                            let ty = Math.max(b.y, Math.min(ball.y, b.y + b.height));
                            let dx = ball.x - tx, dy = ball.y - ty;
                            
                            if (dx * dx + dy * dy <= ballRadius * ballRadius) {
                                if (dx === 0 && dy === 0) {
                                    ball.vy *= -1; ball.y -= ballRadius;
                                }
                                else if (Math.abs(dx) > Math.abs(dy)) { 
                                    ball.vx *= -1; 
                                    ball.x = tx + (dx > 0 ? ballRadius : -ballRadius); 
                                } else { 
                                    ball.vy *= -1; 
                                    ball.y = ty + (dy > 0 ? ballRadius : -ballRadius); 
                                }
                                b.hp--; score++; 
                                if (b.hp <= 0) b.toRemove = true;
                                break; 
                            }
                        }
                        blocks = blocks.filter(b => !b.toRemove);
                    });
                    
                    if (activeBalls === 0) {
                        state = 'aiming'; level++; ballCount += extraBallsNextTurn; extraBallsNextTurn = 0;
                        if (nextStartX !== null) startX = nextStartX; spawnBlocks(); break;
                    }
                }
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // 上部のステータス表示
                ctx.fillStyle = '#fff'; 
                ctx.font = 'bold 20px Arial';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'top';
                ctx.fillText(`SCORE: ${score}`, 15, 20);
                ctx.fillText(`BEST: ${highScore}`, 15, 45);
                
                ctx.textAlign = 'right';
                ctx.fillText(`BALLS: ${ballCount}`, canvas.width - 15, 20);
                
                ctx.beginPath(); ctx.moveTo(0, startY); ctx.lineTo(canvas.width, startY); ctx.strokeStyle = '#555'; ctx.stroke();
                
                // 待機中のボールと照準線
                if (state === 'aiming') {
                    if (isDragging) {
                        ctx.beginPath(); ctx.setLineDash([8,8]); ctx.moveTo(startX, startY); ctx.lineTo(aimX, aimY); 
                        ctx.strokeStyle = '#aaa'; ctx.lineWidth = 2; ctx.stroke(); ctx.setLineDash([]);
                    }
                    ctx.fillStyle = '#fff';
                    ctx.beginPath(); ctx.arc(startX, startY, ballRadius, 0, Math.PI*2); ctx.fill();
                }

                ctx.textBaseline = 'middle';
                blocks.forEach(b => { 
                    let maxExpectedHp = level * hardMax;
                    let ratio = Math.max(0, Math.min(1, b.hp / (maxExpectedHp + 2))); 
                    let hue = ratio * 220;
                    ctx.fillStyle = `hsl(${hue}, 80%, 55%)`; 
                    ctx.fillRect(b.x, b.y, b.width, b.height); 
                    
                    ctx.fillStyle = '#fff'; 
                    ctx.font = 'bold 22px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(b.hp, b.x + b.width/2, b.y + b.height/2); 
                });
                
                items.forEach(it => { 
                    if(it.active) { ctx.fillStyle = '#0f0'; ctx.fillRect(it.x, it.y, it.width, it.height); } 
                });
                
                ctx.fillStyle = '#fff';
                balls.forEach(b => { 
                    if(b.active) { ctx.beginPath(); ctx.arc(b.x, b.y, ballRadius, 0, Math.PI*2); ctx.fill(); } 
                });
                
                if (state === 'gameover') {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = '#fff'; 
                    ctx.font = 'bold 45px Arial';
                    ctx.textAlign = 'center'; 
                    ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);
                    ctx.font = '20px Arial'; 
                    ctx.fillText('Tap to Restart', canvas.width / 2, canvas.height / 2 + 30);
                }

                update(); requestAnimationFrame(draw);
            }

            canvas.addEventListener('touchstart', handleStart, {passive: false});
            canvas.addEventListener('touchmove', handleMove, {passive: false});
            canvas.addEventListener('touchend', handleEnd, {passive: false});
            canvas.addEventListener('mousedown', handleStart);
            window.addEventListener('mousemove', handleMove);
            window.addEventListener('mouseup', handleEnd);
            
            spawnBlocks(); draw();
        } catch(e) { showError('初期化エラー', e); }
    </script>
</body>
</html>
