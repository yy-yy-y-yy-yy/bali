<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ballistic Final</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #111; overflow: hidden; touch-action: none; user-select: none; font-family: sans-serif; }
        /* Canvasを画面いっぱいに表示 */
        #gameCanvas { display: block; width: 100vw; height: 100vh; }
        #ffBtn {
            position: absolute; bottom: 20px; right: 20px; width: 70px; height: 70px; 
            background: rgba(255,255,255,0.2); border-radius: 50%; color: white; 
            border: 2px solid #fff; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 16px; z-index: 10;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ffBtn">1x</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const ffBtn = document.getElementById('ffBtn');

        let speeds = [1, 3, 10, 100], speedIdx = 0;
        let score = 0, highScore = parseInt(localStorage.getItem('ballisticHighScore')) || 0;
        let level = 1, ballCount = 1, extraBallsNextTurn = 0, balls = [], blocks = [], items = [], state = 'aiming';
        let startX = 0, startY = 0, nextStartX = null, aimX = 0, aimY = 0, isDragging = false;
        
        // 高解像度対応のサイズ設定
        function resize() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            ctx.scale(dpr, dpr);
            // CSSサイズを基に計算
            startY = window.innerHeight - 100;
            if (state === 'aiming') startX = window.innerWidth / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        function spawnBlocks() {
            const blockWidth = (window.innerWidth - 4 * 8) / 7;
            blocks.forEach(b => b.y += blockWidth + 4);
            items.forEach(i => i.y += blockWidth + 4);
            for (let i = 0; i < 7; i++) {
                let x = 4 + i * (blockWidth + 4);
                if (Math.random() > 0.8) items.push({ x, y: 90, w: blockWidth, h: blockWidth, active: true });
                else if (Math.random() > 0.4) blocks.push({ x, y: 90, w: blockWidth, h: blockWidth, hp: level });
            }
        }

        function update() {
            if (state !== 'shooting') return;
            for(let step = 0; step < speeds[speedIdx]; step++) {
                let active = 0;
                balls.forEach(b => {
                    if (!b.active) { if (b.delay > 0) { b.delay--; active++; } else b.active = true; return; }
                    b.x += b.vx; b.y += b.vy;
                    if (b.x-6 < 0 || b.x+6 > window.innerWidth) b.vx *= -1;
                    if (b.y-6 < 0) b.vy *= -1;
                    if (b.vy > 0 && b.y >= startY) { b.active = false; b.y = startY; if (nextStartX === null) nextStartX = b.x; return; }
                    active++;
                    blocks.forEach(bl => {
                        let tx = Math.max(bl.x, Math.min(b.x, bl.x+bl.w)), ty = Math.max(bl.y, Math.min(b.y, bl.y+bl.h));
                        let dx = b.x-tx, dy = b.y-ty;
                        if (dx*dx + dy*dy <= 36) {
                            if (Math.abs(dx) > Math.abs(dy)) { b.vx *= -1; b.x = (dx>0)?tx+6:tx-6; }
                            else { b.vy *= -1; b.y = (dy>0)?ty+6:ty-6; }
                            bl.hp--; score++; if (bl.hp <= 0) bl.toRemove = true;
                        }
                    });
                    blocks = blocks.filter(b => !b.toRemove);
                });
                if (active === 0) {
                    state = 'aiming'; level++; ballCount += extraBallsNextTurn; extraBallsNextTurn = 0;
                    if (nextStartX !== null) startX = nextStartX; spawnBlocks();
                    if (score > highScore) { highScore = score; localStorage.setItem('ballisticHighScore', highScore); }
                    break;
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
            ctx.fillStyle = '#fff'; ctx.font = '20px Arial';
            ctx.fillText(`SCORE: ${score}  BEST: ${highScore}`, 20, 40);
            ctx.beginPath(); ctx.moveTo(0, startY); ctx.lineTo(window.innerWidth, startY); ctx.stroke();
            if (state === 'aiming' && isDragging) { ctx.beginPath(); ctx.setLineDash([5,5]); ctx.moveTo(startX, startY); ctx.lineTo(aimX, aimY); ctx.stroke(); ctx.setLineDash([]); }
            blocks.forEach(b => { ctx.fillStyle = '#4a90e2'; ctx.fillRect(b.x, b.y, b.w, b.h); ctx.fillStyle = '#fff'; ctx.textAlign='center'; ctx.fillText(b.hp, b.x+b.w/2, b.y+b.h/2+5); });
            items.forEach(it => { if(it.active) { ctx.fillStyle = '#0f0'; ctx.fillRect(it.x, it.y, it.w, it.h); } });
            balls.forEach(b => { if(b.active) { ctx.beginPath(); ctx.arc(b.x, b.y, 6, 0, Math.PI*2); ctx.fill(); } });
            update(); requestAnimationFrame(draw);
        }

        ffBtn.onclick = () => { speedIdx = (speedIdx + 1) % speeds.length; ffBtn.innerText = speeds[speedIdx] + 'x'; };
        canvas.onmousedown = (e) => { isDragging = true; aimX = e.clientX; aimY = e.clientY; };
        canvas.onmousemove = (e) => { if(isDragging) { aimX = e.clientX; aimY = e.clientY; } };
        canvas.onmouseup = (e) => { 
            if(isDragging) {
                let dx = e.clientX - startX, dy = e.clientY - startY;
                const angle = Math.atan2(dy < -10 ? dy : -10, dx), speed = 22;
                balls = []; for(let i=0; i<ballCount; i++) balls.push({ x: startX, y: startY, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, active: false, delay: i*4 });
                state = 'shooting'; isDragging = false;
            }
        };
        spawnBlocks(); draw();
    </script>
</body>
</html>
