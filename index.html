<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Ballistic Final</title>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #111; overflow: hidden; touch-action: none; 
            user-select: none; -webkit-user-select: none; font-family: sans-serif;
        }
        #gameCanvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block;
        }
        #ffBtn {
            position: absolute; bottom: 20px; right: 20px; width: 70px; height: 70px; 
            background: rgba(255,255,255,0.2); border-radius: 50%; color: white; 
            border: 2px solid #fff; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 14px; z-index: 10;
        }
        #errorBox {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #fff; color: #d00; padding: 20px; box-sizing: border-box; 
            z-index: 9999; display: none; overflow-y: auto;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ffBtn">1x</div>
    <div id="errorBox"></div>

    <script>
        const errBox = document.getElementById('errorBox');
        function showError(msg, err) {
            errBox.style.display = 'block';
            errBox.innerHTML += '<h3>' + msg + '</h3>';
        }
        window.onerror = function(msg, url, line) { showError('エラー: ' + msg + ' (行: ' + line + ')'); return true; };

        try {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const ffBtn = document.getElementById('ffBtn');

            let speeds = [1, 3, 10, 100, 10000];
            let speedIdx = 0;

            let score = 0, highScore = parseInt(localStorage.getItem('ballisticHighScore')) || 0;
            let level = 1, ballCount = 1, extraBallsNextTurn = 0;
            let balls = [], blocks = [], items = [];
            let state = 'aiming'; 
            let startX = 0, startY = 0, nextStartX = null;
            let aimX = 0, aimY = 0, isDragging = false;
            
            const ballRadius = 6;
            const blockCols = 7;
            const blockPadding = 4;

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                startY = canvas.height - 100;
                if (state === 'aiming' && nextStartX === null) startX = canvas.width / 2;
            }

            function resetGame() {
                score = 0; level = 1; ballCount = 1; extraBallsNextTurn = 0;
                blocks = []; items = []; nextStartX = null;
                resize(); state = 'aiming'; spawnBlocks();
            }

            function spawnBlocks() {
                const blockWidth = Math.max(10, (canvas.width - blockPadding * (blockCols + 1)) / blockCols);
                blocks.forEach(b => b.y += blockWidth + blockPadding);
                items.forEach(i => i.y += blockWidth + blockPadding);
                for (let i = 0; i < blockCols; i++) {
                    let x = blockPadding + i * (blockWidth + blockPadding);
                    if (Math.random() > 0.85) items.push({ x: x, y: 90, width: blockWidth, height: blockWidth, active: true });
                    else if (Math.random() > 0.4) blocks.push({ x: x, y: 90, width: blockWidth, height: blockWidth, hp: level });
                }
            }

            ffBtn.addEventListener('click', () => {
                speedIdx = (speedIdx + 1) % speeds.length;
                ffBtn.innerText = speeds[speedIdx] + 'x';
            });

            function handleStart(e) { if(e.cancelable) e.preventDefault(); if (state === 'gameover') { resetGame(); return; } if (state !== 'aiming') return; isDragging = true; aimX = e.clientX || e.touches[0].clientX; aimY = e.clientY || e.touches[0].clientY; }
            function handleMove(e) { if (!isDragging || state !== 'aiming') return; aimX = e.clientX || e.touches[0].clientX; aimY = e.clientY || e.touches[0].clientY; }
            function handleEnd(e) {
                if (!isDragging || state !== 'aiming') return;
                isDragging = false; state = 'shooting'; nextStartX = null;
                let dx = aimX - startX, dy = aimY - startY;
                const angle = Math.atan2(dy < -10 ? dy : -10, dx), speed = 22;
                balls = [];
                for (let i = 0; i < ballCount; i++) balls.push({ x: startX, y: startY, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, active: false, delay: i * 4 });
            }

            function update() {
                if (state !== 'shooting') return;
                for(let step = 0; step < speeds[speedIdx]; step++) {
                    let activeBalls = 0;
                    balls.forEach(b => {
                        if (!b.active) { if (b.delay > 0) { b.delay--; activeBalls++; return; } else b.active = true; }
                        b.x += b.vx; b.y += b.vy;
                        if (b.x - ballRadius < 0 || b.x + ballRadius > canvas.width) { b.vx *= -1; b.x = (b.x < ballRadius) ? ballRadius : canvas.width - ballRadius; }
                        if (b.y - ballRadius < 0) { b.y = ballRadius; b.vy *= -1; }
                        if (b.vy > 0 && b.y >= startY) { b.active = false; b.y = startY; if (nextStartX === null) nextStartX = b.x; return; }
                        activeBalls++;
                        
                        items.forEach(it => { if(it.active && b.x >= it.x && b.x <= it.x+it.width && b.y >= it.y && b.y <= it.y+it.height) { it.active = false; extraBallsNextTurn++; } });

                        blocks.forEach(bl => {
                            let tx = Math.max(bl.x, Math.min(b.x, bl.x + bl.width)), ty = Math.max(bl.y, Math.min(b.y, bl.y + bl.height));
                            let dx = b.x - tx, dy = b.y - ty;
                            if (dx * dx + dy * dy <= ballRadius * ballRadius) {
                                if (Math.abs(dx) > Math.abs(dy)) { b.vx *= -1; b.x = (dx > 0) ? tx + ballRadius : tx - ballRadius; }
                                else { b.vy *= -1; b.y = (dy > 0) ? ty + ballRadius : ty - ballRadius; }
                                bl.hp--; score++; if (bl.hp <= 0) bl.toRemove = true;
                            }
                        });
                        blocks = blocks.filter(b => !b.toRemove);
                    });
                    if (activeBalls === 0) {
                        state = 'aiming'; level++; ballCount += extraBallsNextTurn; extraBallsNextTurn = 0;
                        if (nextStartX !== null) startX = nextStartX; spawnBlocks(); 
                        if (score > highScore) { highScore = score; localStorage.setItem('ballisticHighScore', highScore); }
                        break;
                    }
                }
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff'; ctx.fillText(`SCORE: ${score} | BEST: ${highScore}`, 15, 30);
                ctx.beginPath(); ctx.moveTo(0, startY); ctx.lineTo(canvas.width, startY); ctx.stroke();
                
                if (state === 'aiming') {
                    if (isDragging) { ctx.beginPath(); ctx.setLineDash([8,8]); ctx.moveTo(startX, startY); ctx.lineTo(aimX, aimY); ctx.stroke(); ctx.setLineDash([]); }
                    ctx.beginPath(); ctx.arc(startX, startY, ballRadius, 0, Math.PI*2); ctx.fill();
                }

                blocks.forEach(b => {
                    let ratio = Math.max(0, 1 - (b.hp / (level + 2)));
                    ctx.fillStyle = `hsl(${220 - (ratio * 220)}, 80%, 50%)`;
                    ctx.fillRect(b.x, b.y, b.width, b.height);
                    ctx.fillStyle = '#fff'; ctx.textAlign='center'; ctx.fillText(b.hp, b.x+b.width/2, b.y+b.height/2+5);
                });
                items.forEach(it => { if(it.active) { ctx.fillStyle = '#0f0'; ctx.fillRect(it.x, it.y, it.width, it.height); } });
                balls.forEach(b => { if(b.active) { ctx.beginPath(); ctx.arc(b.x, b.y, ballRadius, 0, Math.PI*2); ctx.fill(); } });
                update(); requestAnimationFrame(draw);
            }

            canvas.addEventListener('touchstart', handleStart, {passive: false});
            canvas.addEventListener('touchmove', handleMove, {passive: false});
            canvas.addEventListener('touchend', handleEnd, {passive: false});
            canvas.addEventListener('mousedown', handleStart);
            window.addEventListener('mousemove', handleMove);
            window.addEventListener('mouseup', handleEnd);
            
            spawnBlocks(); draw();
        } catch(e) { showError('初期化エラー', e); }
    </script>
</body>
</html>
