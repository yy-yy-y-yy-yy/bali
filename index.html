<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ballistic Final</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #111; overflow: hidden; touch-action: none; user-select: none; font-family: sans-serif; }
        #gameCanvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: block; }
        #ffBtn { position: absolute; bottom: 20px; right: 20px; width: 70px; height: 70px; background: #444; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; z-index: 10; cursor: pointer; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ffBtn">1x</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const ffBtn = document.getElementById('ffBtn');

        let speeds = [1, 3, 10, 100, 10000], sIdx = 0;
        let score = 0, level = 1, balls = [], blocks = [], state = 'aiming';
        let startX = window.innerWidth/2, startY = window.innerHeight-100, aimX = 0, aimY = 0, isDragging = false;
        
        function spawnBlocks() {
            let w = (window.innerWidth - 30) / 7;
            blocks.forEach(b => b.y += w + 4);
            for(let i=0; i<7; i++) {
                if(Math.random() > 0.8) blocks.push({x: i*(w+4)+4, y: 90, w: w, h: w, hp: level, isItem: true});
                else if(Math.random() > 0.4) blocks.push({x: i*(w+4)+4, y: 90, w: w, h: w, hp: level, isItem: false});
            }
        }

        function update() {
            if(state !== 'shooting') return;
            for(let step=0; step<speeds[sIdx]; step++) {
                let active = 0;
                balls.forEach(b => {
                    if(!b.active) { if(b.delay>0) b.delay--; else b.active = true; return; }
                    b.x += b.vx; b.y += b.vy;
                    if(b.x<6 || b.x>window.innerWidth-6) b.vx *= -1;
                    if(b.y<6) b.vy *= -1;
                    if(b.y > startY) { b.active = false; b.y = startY; return; }
                    active++;
                    blocks.forEach(bl => {
                        let tx = Math.max(bl.x, Math.min(b.x, bl.x+bl.w)), ty = Math.max(bl.y, Math.min(b.y, bl.y+bl.h));
                        if((b.x-tx)**2 + (b.y-ty)**2 <= 36) {
                            if(Math.abs(b.x-tx) > Math.abs(b.y-ty)) { b.vx *= -1; b.x += (b.x-tx>0?2:-2); } 
                            else { b.vy *= -1; b.y += (b.y-ty>0?2:-2); }
                            if(!bl.isItem) { bl.hp--; score++; if(bl.hp<=0) bl.dead = true; } else bl.dead = true;
                        }
                    });
                    blocks = blocks.filter(b => !b.dead);
                });
                if(active === 0) { state = 'aiming'; level++; spawnBlocks(); break; }
            }
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = '#fff'; ctx.fillText('SCORE: '+score, 20, 30);
            ctx.beginPath(); ctx.moveTo(0, startY); ctx.lineTo(canvas.width, startY); ctx.stroke();
            if(state==='aiming') {
                if(isDragging) { ctx.beginPath(); ctx.setLineDash([5,5]); ctx.moveTo(startX, startY); ctx.lineTo(aimX, aimY); ctx.stroke(); }
                ctx.beginPath(); ctx.arc(startX, startY, 6, 0, Math.PI*2); ctx.fill();
            }
            blocks.forEach(b => { 
                ctx.fillStyle = b.isItem ? '#0f0' : `hsl(${220 - Math.min(b.hp/level*100, 150)}, 80%, 50%)`; 
                ctx.fillRect(b.x, b.y, b.w, b.h); 
                if(!b.isItem) { ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.fillText(b.hp, b.x+b.w/2, b.y+b.h/2); }
            });
            balls.forEach(b => { if(b.active) { ctx.beginPath(); ctx.arc(b.x, b.y, 6, 0, Math.PI*2); ctx.fill(); } });
            update(); requestAnimationFrame(draw);
        }

        ffBtn.onclick = () => { sIdx = (sIdx+1)%speeds.length; ffBtn.innerText = speeds[sIdx]+'x'; };
        window.onmousedown = (e) => { isDragging = true; aimX = e.clientX; aimY = e.clientY; };
        window.onmousemove = (e) => { aimX = e.clientX; aimY = e.clientY; };
        window.onmouseup = (e) => { 
            let dx = aimX-startX, dy = aimY-startY;
            let ang = Math.atan2(dy<-10?dy:-10, dx);
            balls = [{x:startX, y:startY, vx:Math.cos(ang)*10, vy:Math.sin(ang)*10, active:false, delay:0}];
            state = 'shooting'; isDragging = false;
        };
        spawnBlocks(); draw();
    </script>
</body>
</html>
