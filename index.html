<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Ballistic Clone</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #222; 
            overflow: hidden; 
            touch-action: none; 
            position: fixed; 
            top: 0; left: 0; right: 0; bottom: 0;
            font-family: sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas { 
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // エラー表示用
        window.onerror = function(msg, url, line) {
            ctx.fillStyle = '#222'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'red'; ctx.font = '16px Arial'; ctx.textBaseline = 'top';
            ctx.fillText('エラー: ' + msg + ' (' + line + ')', 10, 30);
            return false;
        };

        let highScore = 0;
        try { highScore = localStorage.getItem('ballisticHighScore') || 0; } catch (e) {}

        let score = 0, level = 1, ballCount = 1, extraBallsNextTurn = 0; 
        let balls = [], blocks = [], items = []; 
        let state = 'aiming'; 
        let startX = 0, startY = 0, nextStartX = null; 
        let aimX = 0, aimY = 0, isDragging = false;

        const ballRadius = 6;
        const blockCols = 7;
        const blockPadding = 4;

        function resize() {
            canvas.width = window.innerWidth || document.documentElement.clientWidth || 320;
            canvas.height = window.innerHeight || document.documentElement.clientHeight || 480;
            startY = canvas.height - 100; // 床を少し上に上げて操作しやすく
            if (state === 'aiming' && nextStartX === null) {
                startX = canvas.width / 2;
            }
        }
        window.addEventListener('resize', resize);
        resize();

        function resetGame() {
            score = 0; level = 1; ballCount = 1; extraBallsNextTurn = 0;
            blocks = []; items = []; nextStartX = null;
            resize(); 
            state = 'aiming';
            spawnBlocks();
        }

        function spawnBlocks() {
            const blockWidth = Math.max(10, (canvas.width - blockPadding * (blockCols + 1)) / blockCols);
            const blockHeight = blockWidth;
            const startYPos = 90;

            blocks.forEach(b => b.y += blockHeight + blockPadding);
            items.forEach(i => i.y += blockHeight + blockPadding);

            let isGameOver = false;
            blocks.forEach(b => { if (b.y + b.height >= startY) isGameOver = true; });

            if (isGameOver) {
                state = 'gameover';
                try {
                    if (score > highScore) { highScore = score; localStorage.setItem('ballisticHighScore', highScore); }
                } catch(e) {}
                return;
            }

            let itemCol = Math.floor(Math.random() * blockCols);
            for (let i = 0; i < blockCols; i++) {
                let x = blockPadding + i * (blockWidth + blockPadding);
                if (i === itemCol) {
                    items.push({ x: x + blockWidth / 2, y: startYPos + blockHeight / 2, radius: blockWidth / 3.5, active: true });
                } else if (Math.random() > 0.4) {
                    blocks.push({ x: x, y: startYPos, width: blockWidth, height: blockHeight, hp: level });
                }
            }
        }

        function getTouchPos(e) {
            let cx = e.clientX, cy = e.clientY;
            if (e.touches && e.touches.length > 0) {
                cx = e.touches[0].clientX; cy = e.touches[0].clientY;
            }
            return { x: cx, y: cy };
        }

        function handleStart(e) {
            if (e.cancelable) e.preventDefault();
            if (state === 'gameover') { resetGame(); return; }
            if (state !== 'aiming') return;
            isDragging = true;
            const pos = getTouchPos(e);
            aimX = pos.x; 
            // 狙いを床より必ず上にする
            aimY = Math.min(pos.y, startY - 30);
        }
        
        function handleMove(e) {
            if (e.cancelable) e.preventDefault();
            if (!isDragging || state !== 'aiming') return;
            const pos = getTouchPos(e);
            aimX = pos.x; 
            aimY = Math.min(pos.y, startY - 30);
        }
        
        function handleEnd(e) {
            if (e.cancelable) e.preventDefault();
            if (!isDragging || state !== 'aiming') return;
            isDragging = false;
            shootBalls();
        }

        // イベントリスナーを最適化
        canvas.addEventListener('touchstart', handleStart, {passive: false});
        canvas.addEventListener('touchmove', handleMove, {passive: false});
        canvas.addEventListener('touchend', handleEnd, {passive: false});
        canvas.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove, {passive: false});
        window.addEventListener('mouseup', handleEnd, {passive: false});

        function shootBalls() {
            state = 'shooting';
            nextStartX = null;
            
            // 角度の計算
            let dx = aimX - startX;
            let dy = aimY - startY;
            // 真下や真横に撃てないように角度を制限
            if (dy > -10) dy = -10; 
            
            const angle = Math.atan2(dy, dx);
            const speed = 22; // 少しスピードアップ
            const vx = Math.cos(angle) * speed;
            const vy = Math.sin(angle) * speed;

            balls = [];
            for (let i = 0; i < ballCount; i++) {
                balls.push({ x: startX, y: startY, vx: vx, vy: vy, active: false, delay: i * 4 });
            }
        }

        function update() {
            if (state !== 'shooting') return;
            let activeBalls = 0;

            balls.forEach(ball => {
                // 【超重要バグ修正箇所】
                // 以前はここで return してしまっていたため、active になった瞬間にボールが消滅（カウント0）扱いになっていました。
                if (!ball.active) {
                    if (ball.delay > 0) {
                        ball.delay--; 
                        activeBalls++; // まだ待機中なのでカウントする
                        return; // 待機中なので動かさずに次へ
                    } else {
                        ball.active = true; // 出撃！ （ここは return せずに下の移動処理へ進む！）
                    }
                }

                // ボールの移動
                ball.x += ball.vx; 
                ball.y += ball.vy;

                // 左右の壁の反射
                if (ball.x - ballRadius < 0 || ball.x + ballRadius > canvas.width) {
                    ball.vx *= -1;
                    ball.x = ball.x - ballRadius < 0 ? ballRadius : canvas.width - ballRadius;
                }
                // 天井の反射
                if (ball.y - ballRadius < 0) {
                    ball.vy *= -1; 
                    ball.y = ballRadius;
                }

                // 床に到達した時の処理 (vy > 0 つまり下向きに落ちてきた時のみ)
                if (ball.vy > 0 && ball.y >= startY) {
                    ball.active = false; 
                    ball.y = startY;
                    if (nextStartX === null) nextStartX = ball.x;
                    ball.x = nextStartX;
                    return; // 床に着いたのでこのボールの処理は終わり
                }
                
                activeBalls++; // 動いているボールとしてカウント

                // アイテム取得判定
                for (let i = items.length - 1; i >= 0; i--) {
                    let item = items[i];
                    if (!item.active) continue;
                    let dx = ball.x - item.x, dy = ball.y - item.y;
                    if (Math.sqrt(dx * dx + dy * dy) <= ballRadius + item.radius) {
                        item.active = false; extraBallsNextTurn++; items.splice(i, 1);
                    }
                }

                // ブロック破壊判定
                for (let i = blocks.length - 1; i >= 0; i--) {
                    let b = blocks[i];
                    let testX = Math.max(b.x, Math.min(ball.x, b.x + b.width));
                    let testY = Math.max(b.y, Math.min(ball.y, b.y + b.height));
                    let distX = ball.x - testX, distY = ball.y - testY;

                    if (Math.sqrt(distX * distX + distY * distY) <= ballRadius) {
                        // 衝突による反射方向の決定
                        if (Math.abs(distX) > Math.abs(distY)) {
                            ball.vx *= -1;
                            ball.x = ball.x < b.x ? b.x - ballRadius : b.x + b.width + ballRadius;
                        } else {
                            ball.vy *= -1;
                            ball.y = ball.y < b.y ? b.y - ballRadius : b.y + b.height + ballRadius;
                        }
                        
                        b.hp--; 
                        score++;
                        if (b.hp <= 0) blocks.splice(i, 1);
                        break; // 一度に複数のブロックに当たらないよう抜ける
                    }
                }
            });

            // 全てのボールが戻ってきたらターン終了
            if (activeBalls === 0) {
                state = 'aiming'; 
                level++; 
                ballCount += extraBallsNextTurn; 
                extraBallsNextTurn = 0;
                if (nextStartX !== null) startX = nextStartX;
                spawnBlocks();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // UI
            ctx.fillStyle = '#fff'; ctx.font = '24px Arial';
            ctx.textAlign = '
