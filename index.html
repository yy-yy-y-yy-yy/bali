<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Ballistic Clone</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #222; 
            overflow: hidden; 
            touch-action: none; 
            font-family: sans-serif;
        }
        canvas { 
            display: block; 
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 【修正】Safariでのハイスコア保存エラー（セキュリティブロック）を回避
        let highScore = 0;
        try {
            highScore = localStorage.getItem('ballisticHighScore') || 0;
        } catch (e) {
            console.warn('localStorage is blocked');
        }

        // ゲームの基本状態
        let score = 0;
        let level = 1;
        let ballCount = 1; 
        let extraBallsNextTurn = 0; 
        
        let balls = [];
        let blocks = [];
        let items = []; 
        
        let state = 'aiming'; 
        let startX = 0;
        let startY = 0; 
        let nextStartX = null; 
        
        let aimX = 0;
        let aimY = 0;
        let isDragging = false;

        const ballRadius = 6;
        const blockCols = 7;
        const blockPadding = 5;

        // 【修正】起動時の画面サイズ取得エラーを防止
        function resize() {
            // サイズが0になるのを防ぐため、最低でも320x480を確保
            canvas.width = window.innerWidth || 320;
            canvas.height = window.innerHeight || 480;
            
            // 床（発射位置）の高さを画面下部に正しく設定
            startY = canvas.height - 80; 
            if (state === 'aiming' && nextStartX === null) {
                startX = canvas.width / 2;
            }
        }
        window.addEventListener('resize', resize);
        resize(); // 初回実行

        function resetGame() {
            score = 0;
            level = 1;
            ballCount = 1;
            extraBallsNextTurn = 0;
            blocks = [];
            items = [];
            nextStartX = null;
            resize(); // リセット時にもう一度サイズを整える
            state = 'aiming';
            spawnBlocks();
        }

        function spawnBlocks() {
            // 【修正】ブロックサイズがマイナスにならないよう保護
            const blockWidth = Math.max(10, (canvas.width - blockPadding * (blockCols + 1)) / blockCols);
            const blockHeight = blockWidth;
            const startYPos = 80;

            blocks.forEach(b => b.y += blockHeight + blockPadding);
            items.forEach(i => i.y += blockHeight + blockPadding);

            // ゲームオーバー判定
            let isGameOver = false;
            blocks.forEach(b => {
                if (b.y + b.height >= startY) isGameOver = true;
            });

            if (isGameOver) {
                state = 'gameover';
                try {
                    if (score > highScore) {
                        highScore = score;
                        localStorage.setItem('ballisticHighScore', highScore);
                    }
                } catch(e) {}
                return;
            }

            let itemCol = Math.floor(Math.random() * blockCols);
            for (let i = 0; i < blockCols; i++) {
                let x = blockPadding + i * (blockWidth + blockPadding);
                if (i === itemCol) {
                    items.push({
                        x: x + blockWidth / 2,
                        y: startYPos + blockHeight / 2,
                        radius: Math.max(2, blockWidth / 3), // 【修正】半径マイナスエラーを防止
                        active: true
                    });
                } else if (Math.random() > 0.4) {
                    blocks.push({
                        x: x,
                        y: startYPos,
                        width: blockWidth,
                        height: blockHeight,
                        hp: level
                    });
                }
            }
        }

        function handleStart(e) {
            if (state === 'gameover') {
                resetGame();
                return;
            }
            if (state !== 'aiming') return;
            isDragging = true;
            updateAim(e);
        }
        
        function handleMove(e) {
            if (!isDragging || state !== 'aiming') return;
            updateAim(e);
        }
        
        function handleEnd(e) {
            if (!isDragging || state !== 'aiming') return;
            isDragging = false;
            shootBalls();
        }

        function updateAim(e) {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            aimX = clientX;
            aimY = clientY;
            if (aimY > startY - 20) aimY = startY - 20; 
        }

        canvas.addEventListener('touchstart', handleStart);
        canvas.addEventListener('touchmove', handleMove, {passive: false});
        canvas.addEventListener('touchend', handleEnd);
        canvas.addEventListener('mousedown', handleStart);
        canvas.addEventListener('mousemove', handleMove);
        canvas.addEventListener('mouseup', handleEnd);
        
        canvas.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });

        function shootBalls() {
            state = 'shooting';
            nextStartX = null;
            const angle = Math.atan2(aimY - startY, aimX - startX);
            const speed = 18;
            const vx = Math.cos(angle) * speed;
            const vy = Math.sin(angle) * speed;

            balls = [];
            for (let i = 0; i < ballCount; i++) {
                balls.push({
                    x: startX,
                    y: startY,
                    vx: vx,
                    vy: vy,
                    active: false,
                    delay: i * 4 
                });
            }
        }

        function update() {
            if (state !== 'shooting') return;
            let activeBalls = 0;

            balls.forEach(ball => {
                if (!ball.active) {
                    if (ball.delay <= 0) ball.active = true;
                    else { ball.delay--; activeBalls++; }
                    return;
                }

                ball.x += ball.vx;
                ball.y += ball.vy;

                if (ball.x - ballRadius < 0 || ball.x + ballRadius > canvas.width) {
                    ball.vx *= -1;
                    ball.x = ball.x - ballRadius < 0 ? ballRadius : canvas.width - ballRadius;
                }
                if (ball.y - ballRadius < 0) {
                    ball.vy *= -1;
                    ball.y = ballRadius;
                }

                if (ball.y + ballRadius >= startY) {
                    ball.active = false;
                    ball.y = startY;
                    if (nextStartX === null) nextStartX = ball.x;
                    ball.x = nextStartX;
                    return;
                }

                activeBalls++;

                for (let i = items.length - 1; i >= 0; i--) {
                    let item = items[i];
                    if (!item.active) continue;
                    let dx = ball.x - item.x;
                    let dy = ball.y - item.y;
                    if (Math.sqrt(dx * dx + dy * dy) <= ballRadius + item.radius) {
                        item.active = false;
                        extraBallsNextTurn++;
                        items.splice(i, 1);
                    }
                }

                for (let i = blocks.length - 1; i >= 0; i--) {
                    let b = blocks[i];
                    let testX = ball.x;
                    let testY = ball.y;

                    if (ball.x < b.x) testX = b.x; 
                    else if (ball.x > b.x + b.width) testX = b.x + b.width;
                    if (ball.y < b.y) testY = b.y; 
                    else if (ball.y > b.y + b.height) testY = b.y + b.height;

                    let distX = ball.x - testX;
                    let distY = ball.y - testY;

                    if (Math.sqrt((distX * distX) + (distY * distY)) <= ballRadius) {
                        if (Math.abs(distX) > Math.abs(distY)) ball.vx *= -1;
                        else ball.vy *= -1;
                        b.hp--;
                        score++;
                        if (b.hp <= 0) blocks.splice(i, 1);
                        break;
                    }
                }
            });

            if (activeBalls === 0) {
                state = 'aiming';
                level++;
                ballCount += extraBallsNextTurn;
                extraBallsNextTurn = 0;
                if (nextStartX !== null) startX = nextStartX;
                spawnBlocks();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#fff';
            ctx.font = '24px Arial';
            ctx.textAlign = 'left';
            ctx.fillText(`SCORE: ${score}`, 15, 40);
            ctx.textAlign = 'right';
            ctx.fillText(`BEST: ${highScore}`, canvas.width - 15, 40);

            ctx.beginPath();
            ctx.moveTo(0, startY);
            ctx.lineTo(canvas.width, startY);
            ctx.strokeStyle = '#444';
            ctx.lineWidth = 2;
            ctx.stroke();

            if (state === 'aiming' && isDragging) {
                ctx.beginPath();
                ctx.setLineDash([10, 10]);
                ctx.moveTo(startX, startY);
                const angle = Math.atan2(aimY - startY, aimX - startX);
                const lineLength = 1000;
                ctx.lineTo(startX + Math.cos(angle) * lineLength, startY + Math.sin(angle) * lineLength);
                ctx.strokeStyle = '#888';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.setLineDash([]);
            }

            blocks.forEach(b => {
                ctx.fillStyle = `hsl(${(b.hp * 10 + 180) % 360}, 70%, 50%)`;
                ctx.fillRect(b.x, b.y, b.width, b.height);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 20px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(b.hp, b.x + b.width / 2, b.y + b.height / 2);
            });

            items.forEach(item => {
                ctx.beginPath();
                ctx.arc(item.x, item.y, item.radius, 0, Math.PI * 2);
                ctx.strokeStyle = '#0f0';
                ctx.lineWidth = 3;
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(item.x, item.y, item.radius / 2, 0, Math.PI * 2);
                ctx.fillStyle = '#0f0';
                ctx.fill();
            });

            ctx.fillStyle = '#fff';
            if (state === 'shooting') {
                balls.forEach(ball => {
                    if (ball.active) {
                        ctx.beginPath();
                        ctx.arc(ball.x, ball.y, ballRadius, 0, Math.PI * 2);
                        ctx.fill();
                    }
                });
            } else if (state === 'aiming') {
                ctx.beginPath();
                ctx.arc(startX, startY, ballRadius, 0, Math.PI * 2);
                ctx.fill();
                ctx.font = '14px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('x' + ballCount, startX, startY - 15);
            }

            if (state === 'gameover') {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);
                ctx.font = '20px Arial';
                ctx.fillText('Tap to Restart', canvas.width / 2, canvas.height / 2 + 30);
            }
        }

        resetGame();

        // 【修正】エラー発生時に画面に理由を表示する安全なループ
        function loop() {
            try {
                update();
                draw();
                requestAnimationFrame(loop);
            } catch (e) {
                // エラー内容を画面に赤文字で表示
                ctx.fillStyle = '#222';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'red';
                ctx.font = '16px Arial';
                ctx.textAlign = 'left';
                ctx.fillText('Error: ' + e.message, 10, 50);
            }
        }
        loop();

    </script>
</body>
</html>
