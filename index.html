<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ballistic Pro</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #111; overflow: hidden; touch-action: none; user-select: none; font-family: sans-serif; }
        #gameCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; }
        #ffBtn {
            position: absolute; bottom: 20px; right: 20px; width: 70px; height: 70px; 
            background: rgba(255,255,255,0.2); border-radius: 50%; color: white; 
            border: 2px solid #fff; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 16px; z-index: 10;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ffBtn">1x</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const ffBtn = document.getElementById('ffBtn');

        let speeds = [1, 3, 10, 100];
        let speedIdx = 0;
        let score = 0, level = 1, ballCount = 1, extraBallsNextTurn = 0;
        let balls = [], blocks = [], items = [], state = 'aiming';
        let startX = 0, startY = 0, nextStartX = null, aimX = 0, aimY = 0, isDragging = false;
        
        const ballRadius = 6;
        const blockCols = 7;
        const blockPadding = 4;

        function resize() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            startY = canvas.height - 100;
            if (state === 'aiming' && nextStartX === null) startX = canvas.width / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        function spawnBlocks() {
            const blockWidth = (canvas.width - blockPadding * (blockCols + 1)) / blockCols;
            blocks.forEach(b => b.y += blockWidth + blockPadding);
            items.forEach(i => i.y += blockWidth + blockPadding);
            
            for (let i = 0; i < blockCols; i++) {
                let x = blockPadding + i * (blockWidth + blockPadding);
                if (Math.random() > 0.8) items.push({ x, y: 90, w: blockWidth, h: blockWidth, active: true });
                else if (Math.random() > 0.4) blocks.push({ x, y: 90, w: blockWidth, h: blockWidth, hp: level });
            }
        }

        function update() {
            if (state !== 'shooting') return;
            for(let step = 0; step < speeds[speedIdx]; step++) {
                let activeBalls = 0;
                balls.forEach(ball => {
                    if (!ball.active) {
                        if (ball.delay > 0) { ball.delay--; activeBalls++; } else ball.active = true;
                        return;
                    }
                    ball.x += ball.vx; ball.y += ball.vy;

                    // 壁
                    if (ball.x - ballRadius < 0) { ball.x = ballRadius; ball.vx *= -1; }
                    else if (ball.x + ballRadius > canvas.width) { ball.x = canvas.width - ballRadius; ball.vx *= -1; }
                    if (ball.y - ballRadius < 0) { ball.y = ballRadius; ball.vy *= -1; }

                    // 床
                    if (ball.vy > 0 && ball.y >= startY) {
                        ball.active = false; ball.y = startY;
                        if (nextStartX === null) nextStartX = ball.x;
                        return;
                    }
                    activeBalls++;

                    // ブロック判定（押し出し補正付き）
                    blocks.forEach(b => {
                        let closestX = Math.max(b.x, Math.min(ball.x, b.x + b.w));
                        let closestY = Math.max(b.y, Math.min(ball.y, b.y + b.h));
                        let dx = ball.x - closestX, dy = ball.y - closestY;
                        if (dx * dx + dy * dy <= ballRadius * ballRadius) {
                            if (Math.abs(dx) > Math.abs(dy)) {
                                ball.vx *= -1; ball.x = (dx > 0) ? closestX + ballRadius : closestX - ballRadius;
                            } else {
                                ball.vy *= -1; ball.y = (dy > 0) ? closestY + ballRadius : closestY - ballRadius;
                            }
                            b.hp--; score++; if (b.hp <= 0) b.toRemove = true;
                        }
                    });
                    blocks = blocks.filter(b => !b.toRemove);
                });
                if (activeBalls === 0) {
                    state = 'aiming'; level++; ballCount += extraBallsNextTurn; extraBallsNextTurn = 0;
                    if (nextStartX !== null) startX = nextStartX; spawnBlocks(); break;
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            blocks.forEach(b => { ctx.fillStyle = '#4a90e2'; ctx.fillRect(b.x, b.y, b.w, b.h); ctx.fillStyle = '#fff'; ctx.fillText(b.hp, b.x+b.w/2, b.y+b.h/2); });
            balls.forEach(ball => { if(ball.active) { ctx.beginPath(); ctx.arc(ball.x, ball.y, ballRadius, 0, Math.PI*2); ctx.fill(); } });
            requestAnimationFrame(() => { update(); draw(); });
        }

        ffBtn.addEventListener('click', () => {
            speedIdx = (speedIdx + 1) % speeds.length;
            ffBtn.innerText = speeds[speedIdx] + 'x';
        });

        canvas.addEventListener('touchstart', (e) => { 
            if(state==='aiming') { isDragging = true; aimX = e.touches[0].clientX; aimY = e.touches[0].clientY; }
        });
        canvas.addEventListener('touchend', (e) => { 
            if(isDragging) {
                let dx = e.changedTouches[0].clientX - startX, dy = e.changedTouches[0].clientY - startY;
                const angle = Math.atan2(dy < -10 ? dy : -10, dx), speed = 22;
                balls = [];
                for(let i=0; i<ballCount; i++) balls.push({ x: startX, y: startY, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, active: false, delay: i*4 });
                state = 'shooting'; isDragging = false;
            }
        });
        
        spawnBlocks(); draw();
    </script>
</body>
</html>
