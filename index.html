<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Ballistic Clone</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #222; 
            overflow: hidden; 
            touch-action: none; 
            position: fixed; 
            top: 0; left: 0; right: 0; bottom: 0;
            font-family: sans-serif;
        }
        canvas { 
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 【最重要】あらゆるエラーをキャッチして画面に表示する
        window.onerror = function(message, source, lineno, colno, error) {
            ctx.fillStyle = '#222';
            ctx.fillRect(0, 0, canvas.width || 300, canvas.height || 500);
            ctx.fillStyle = 'red';
            ctx.font = '16px Arial';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            ctx.fillText('エラーが発生しました:', 10, 30);
            ctx.fillText(message, 10, 60);
            ctx.fillText('行: ' + lineno, 10, 90);
            return true;
        };

        // ハイスコアの安全な取得
        let highScore = 0;
        try {
            highScore = localStorage.getItem('ballisticHighScore') || 0;
        } catch (e) {}

        let score = 0, level = 1, ballCount = 1, extraBallsNextTurn = 0; 
        let balls = [], blocks = [], items = []; 
        let state = 'aiming'; 
        let startX = 0, startY = 0, nextStartX = null; 
        let aimX = 0, aimY = 0, isDragging = false;

        const ballRadius = 7;
        const blockCols = 7;
        const blockPadding = 5;

        // 確実な画面サイズ取得
        function resize() {
            const w = window.innerWidth || document.documentElement.clientWidth || 320;
            const h = window.innerHeight || document.documentElement.clientHeight || 480;
            canvas.width = w;
            canvas.height = h;
            startY = h - 80;
            if (state === 'aiming' && nextStartX === null) {
                startX = w / 2;
            }
        }
        window.addEventListener('resize', resize);
        resize();

        function resetGame() {
            score = 0; level = 1; ballCount = 1; extraBallsNextTurn = 0;
            blocks = []; items = []; nextStartX = null;
            resize(); 
            state = 'aiming';
            spawnBlocks();
        }

        function spawnBlocks() {
            const blockWidth = Math.max(10, (canvas.width - blockPadding * (blockCols + 1)) / blockCols);
            const blockHeight = blockWidth;
            const startYPos = 80;

            blocks.forEach(b => b.y += blockHeight + blockPadding);
            items.forEach(i => i.y += blockHeight + blockPadding);

            let isGameOver = false;
            blocks.forEach(b => { if (b.y + b.height >= startY) isGameOver = true; });

            if (isGameOver) {
                state = 'gameover';
                try {
                    if (score > highScore) {
                        highScore = score;
                        localStorage.setItem('ballisticHighScore', highScore);
                    }
                } catch(e) {}
                return;
            }

            let itemCol = Math.floor(Math.random() * blockCols);
            for (let i = 0; i < blockCols; i++) {
                let x = blockPadding + i * (blockWidth + blockPadding);
                if (i === itemCol) {
                    items.push({
                        x: x + blockWidth / 2,
                        y: startYPos + blockHeight / 2,
                        radius: Math.max(5, blockWidth / 3.5),
                        active: true
                    });
                } else if (Math.random() > 0.4) {
                    blocks.push({ x: x, y: startYPos, width: blockWidth, height: blockHeight, hp: level });
                }
            }
        }

        function getTouchPos(e) {
            const rect = canvas.getBoundingClientRect();
            let cx = e.clientX, cy = e.clientY;
            if (e.touches && e.touches.length > 0) {
                cx = e.touches[0].clientX; cy = e.touches[0].clientY;
            }
            return { x: cx - rect.left, y: cy - rect.top };
        }

        function handleStart(e) {
            if (e.cancelable) e.preventDefault();
            if (state === 'gameover') { resetGame(); return; }
            if (state !== 'aiming') return;
            isDragging = true;
            const pos = getTouchPos(e);
            aimX = pos.x; aimY = Math.min(pos.y, startY - 20);
        }
        
        function handleMove(e) {
            if (e.cancelable) e.preventDefault();
            if (!isDragging || state !== 'aiming') return;
            const pos = getTouchPos(e);
            aimX = pos.x; aimY = Math.min(pos.y, startY - 20);
        }
        
        function handleEnd(e) {
            if (e.cancelable) e.preventDefault();
            if (!isDragging || state !== 'aiming') return;
            isDragging = false;
            shootBalls();
        }

        canvas.addEventListener('touchstart', handleStart, {passive: false});
        canvas.addEventListener('touchmove', handleMove, {passive: false});
        canvas.addEventListener('touchend', handleEnd, {passive: false});
        canvas.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove, {passive: false});
        window.addEventListener('mouseup', handleEnd, {passive: false});

        function shootBalls() {
            state = 'shooting';
            nextStartX = null;
            const angle = Math.atan2(aimY - startY, aimX - startX);
            const speed = 20;
            const vx = Math.cos(angle) * speed;
            const vy = Math.sin(angle) * speed;

            balls = [];
            for (let i = 0; i < ballCount; i++) {
                balls.push({ x: startX, y: startY, vx: vx, vy: vy, active: false, delay: i * 3 });
            }
        }

        function update() {
            if (state !== 'shooting') return;
            let activeBalls = 0;

            balls.forEach(ball => {
                if (!ball.active) {
                    if (ball.delay <= 0) ball.active = true;
                    else { ball.delay--; activeBalls++; }
                    return;
                }

                ball.x += ball.vx; ball.y += ball.vy;

                if (ball.x - ballRadius < 0 || ball.x + ballRadius > canvas.width) {
                    ball.vx *= -1;
                    ball.x = ball.x - ballRadius < 0 ? ballRadius : canvas.width - ballRadius;
                }
                if (ball.y - ballRadius < 0) {
                    ball.vy *= -1; ball.y = ballRadius;
                }

                if (ball.y + ballRadius >= startY) {
                    ball.active = false; ball.y = startY;
                    if (nextStartX === null) nextStartX = ball.x;
                    ball.x = nextStartX;
                    return;
                }
                activeBalls++;

                for (let i = items.length - 1; i >= 0; i--) {
                    let item = items[i];
                    if (!item.active) continue;
                    let dx = ball.x - item.x, dy = ball.y - item.y;
                    if (Math.sqrt(dx * dx + dy * dy) <= ballRadius + item.radius) {
                        item.active = false; extraBallsNextTurn++; items.splice(i, 1);
                    }
                }

                for (let i = blocks.length - 1; i >= 0; i--) {
                    let b = blocks[i];
                    let testX = Math.max(b.x, Math.min(ball.x, b.x + b.width));
                    let testY = Math.max(b.y, Math.min(ball.y, b.y + b.height));
                    let distX = ball.x - testX, distY = ball.y - testY;

                    if (Math.sqrt(distX * distX + distY * distY) <= ballRadius) {
                        if (Math.abs(distX) > Math.abs(distY)) {
                            ball.vx *= -1;
                            ball.x = ball.x < b.x ? b.x - ballRadius : b.x + b.width + ballRadius;
                        } else {
                            ball.vy *= -1;
                            ball.y = ball.y < b.y ? b.y - ballRadius : b.y + b.height + ballRadius;
                        }
                        b.hp--; score++;
                        if (b.hp <= 0) blocks.splice(i, 1);
                        break;
                    }
                }
            });

            if (activeBalls === 0) {
                state = 'aiming'; level++; ballCount += extraBallsNextTurn; extraBallsNextTurn = 0;
                if (nextStartX !== null) startX = nextStartX;
                spawnBlocks();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#fff'; ctx.font = '24px Arial';
            ctx.textAlign = 'left'; ctx.textBaseline = 'top'; ctx.fillText(`SCORE: ${score}`, 15, 45);
            ctx.textAlign = 'right'; ctx.fillText(`BEST: ${highScore}`, canvas.width - 15, 45);

            ctx.beginPath(); ctx.moveTo(0, startY); ctx.lineTo(canvas.width, startY);
            ctx.strokeStyle = '#444'; ctx.lineWidth = 2; ctx.stroke();

            if (state === 'aiming' && isDragging) {
                ctx.beginPath(); ctx.setLineDash([10, 10]); ctx.moveTo(startX, startY);
                const angle = Math.atan2(aimY - startY, aimX - startX);
                ctx.lineTo(startX + Math.cos(angle) * 1000, startY + Math.sin(angle) * 1000);
                ctx.strokeStyle = '#888'; ctx.lineWidth = 2; ctx.stroke(); ctx.setLineDash([]);
            }

            blocks.forEach(b => {
                ctx.fillStyle = `hsl(${(b.hp * 10 + 180) % 360}, 70%, 50%)`;
                ctx.fillRect(b.x, b.y, b.width, b.height);
                ctx.fillStyle = '#fff'; ctx.font = 'bold 20px Arial';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(b.hp, b.x + b.width / 2, b.y + b.height / 2);
            });

            items.forEach(item => {
                ctx.beginPath(); ctx.arc(item.x, item.y, item.radius, 0, Math.PI * 2);
                ctx.strokeStyle = '#0f0'; ctx.lineWidth = 3; ctx.stroke();
                ctx.beginPath(); ctx.arc(item.x, item.y, item.radius / 2, 0, Math.PI * 2);
                ctx.fillStyle = '#0f0'; ctx.fill();
            });

            ctx.fillStyle = '#fff';
            if (state === 'shooting') {
                balls.forEach(ball => {
                    if (ball.active) {
                        ctx.beginPath(); ctx.arc(ball.x, ball.y, ballRadius, 0, Math.PI * 2); ctx.fill();
                    }
                });
            } else if (state === 'aiming') {
                ctx.beginPath(); ctx.arc(startX, startY, ballRadius, 0, Math.PI * 2); ctx.fill();
                ctx.font = '16px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText('x' + ballCount, startX, startY - 20);
            }

            if (state === 'gameover') {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff'; ctx.font = 'bold 40px Arial';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);
                ctx.font = '20px Arial'; ctx.fillText('Tap to Restart', canvas.width / 2, canvas.height / 2 + 30);
            }
        }

        resetGame();
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        loop();

    </script>
</body>
</html>
